apiVersion: apps/v1
kind: Deployment
metadata:
  name: thingsboard-data-generator
  labels:
    app: thingsboard-data-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thingsboard-data-generator
  template:
    metadata:
      labels:
        app: thingsboard-data-generator
    spec:
      containers:
      - name: thingsboard-data-generator
        image: ${YOUR_REGISTRY}/thingsboard-data-generator:latest
        ports:
        - containerPort: 5001
        env:
        - name: TB_HOST
          valueFrom:
            configMapKeyRef:
              name: thingsboard-data-generator-config
              key: TB_HOST
        - name: TB_PORT
          valueFrom:
            configMapKeyRef:
              name: thingsboard-data-generator-config
              key: TB_PORT
        - name: TB_USERNAME
          valueFrom:
            secretKeyRef:
              name: thingsboard-data-generator-secrets
              key: TB_USERNAME
        - name: TB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: thingsboard-data-generator-secrets
              key: TB_PASSWORD
        - name: FLASK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: thingsboard-data-generator-secrets
              key: FLASK_SECRET_KEY
        - name: FLASK_DEBUG
          valueFrom:
            configMapKeyRef:
              name: thingsboard-data-generator-config
              key: FLASK_DEBUG
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 5001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: thingsboard-data-generator
spec:
  selector:
    app: thingsboard-data-generator
  ports:
  - port: 80
    targetPort: 5001
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: thingsboard-data-generator-config
data:
  TB_HOST: "http://thingsboard-service"
  TB_PORT: "8080"
  FLASK_DEBUG: "False"
---
apiVersion: v1
kind: Secret
metadata:
  name: thingsboard-data-generator-secrets
type: Opaque
stringData:
  TB_USERNAME: "tenant@thingsboard.org"
  TB_PASSWORD: "tenant"
  FLASK_SECRET_KEY: "change-this-in-production"
